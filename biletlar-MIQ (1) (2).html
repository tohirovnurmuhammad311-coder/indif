<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MIQ Savollari">
<meta name="theme-color" content="#2c1810">
<title>Mahsulotlarni identifikasiyalash va qalbakilashtirish — Imtihon Savollari</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --card: #fffdf8;
    --accent: #8b4513;
    --accent2: #c07830;
    --text: #2c1810;
    --muted: #8a7060;
    --border: #d4c4a8;
    --tag-bg: #f0e6d0;
    --answer-bg: #fef9f0;
    --answer-border: #e8d4a0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Source Serif 4', Georgia, serif;
    color: var(--text);
    min-height: 100vh;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    -webkit-tap-highlight-color: transparent;
    background-image: 
      radial-gradient(ellipse at 20% 10%, rgba(139,69,19,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 90%, rgba(192,120,48,0.05) 0%, transparent 60%);
  }

  header {
    background: var(--text);
    color: #f5f0e8;
    padding: 40px 24px 32px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      45deg, transparent, transparent 40px, rgba(255,255,255,0.02) 40px, rgba(255,255,255,0.02) 41px
    );
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    letter-spacing: 0.02em;
    position: relative;
  }
  header p {
    margin-top: 8px;
    opacity: 0.65;
    font-size: 0.9rem;
    font-style: italic;
    position: relative;
  }

  .controls {
    max-width: 900px;
    margin: 28px auto 0;
    padding: 0 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    justify-content: space-between;
  }

  .search-box {
    flex: 1; min-width: 200px;
    display: flex;
    align-items: center;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    gap: 8px;
  }
  .search-box input {
    border: none; background: none; outline: none;
    font-family: inherit; font-size: 1rem;
    color: var(--text); width: 100%;
  }
  .search-box input::placeholder { color: var(--muted); }
  .search-icon { color: var(--muted); font-size: 1rem; }

  .filter-btns {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-family: inherit; font-size: 0.8rem;
    cursor: pointer; transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .grid {
    max-width: 900px;
    margin: 20px auto 60px;
    padding: 0 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 20px;
  }

  .card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 2px 8px rgba(44,24,16,0.06);
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(44,24,16,0.12);
  }
  .card-header {
    background: var(--accent);
    padding: 12px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-header h2 {
    color: white;
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .card-header .num {
    background: rgba(255,255,255,0.2);
    color: white;
    font-size: 0.75rem;
    padding: 2px 8px;
    border-radius: 20px;
  }

  .card-body { padding: 16px 18px; }

  .question {
    margin-bottom: 12px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .question-header {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 14px;
    cursor: pointer;
    background: var(--card);
    transition: background 0.15s;
    user-select: none;
  }
  .question-header:hover { background: var(--tag-bg); }
  .q-num {
    flex-shrink: 0;
    width: 24px; height: 24px;
    background: var(--accent2);
    color: white;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.72rem; font-weight: 600;
    font-family: 'Playfair Display', serif;
    margin-top: 1px;
  }
  .q-text {
    flex: 1;
    font-size: 0.88rem;
    line-height: 1.5;
    color: var(--text);
    font-weight: 600;
  }
  .toggle-icon {
    flex-shrink: 0;
    color: var(--muted);
    transition: transform 0.25s;
    font-size: 0.8rem;
    margin-top: 3px;
  }
  .question.open .toggle-icon { transform: rotate(180deg); }

  .answer {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease;
  }
  .question.open .answer { max-height: 700px; }
  .answer-inner {
    padding: 14px 14px 14px 48px;
    background: var(--answer-bg);
    border-top: 1px solid var(--answer-border);
    font-size: 0.85rem;
    line-height: 1.7;
    color: #3d2415;
  }
  .answer-inner p { margin-bottom: 8px; }
  .answer-inner p:last-child { margin-bottom: 0; }
  .answer-inner strong { color: var(--accent); }

  .tags {
    display: flex; flex-wrap: wrap; gap: 5px;
    margin-top: 14px; padding-top: 12px;
    border-top: 1px dashed var(--border);
  }
  .tag {
    background: var(--tag-bg);
    color: var(--muted);
    font-size: 0.72rem;
    padding: 3px 9px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  .hidden { display: none !important; }

  .empty {
    text-align: center;
    color: var(--muted);
    font-style: italic;
    padding: 60px 20px;
    grid-column: 1 / -1;
  }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>📚 Mahsulotlarni identifikasiyalash va qalbakilashtirish</h1>

</header>

<div class="controls">

function renderCards(list) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  if (!list.length) {
    grid.innerHTML = '<div class="empty">Hech narsa topilmadi 🔍</div>';
    return;
  }
  list.forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.tags = item.tags.join(',');
    card.dataset.variant = item.variant;
    card.innerHTML = `
      <div class="card-header">
        <h2>📋 ${item.variant}-SAVOL</h2>
        <span class="num">${item.questions.length} qism</span>
      </div>
      <div class="card-body">
        ${item.questions.map((q, i) => `
          <div class="question" id="q-${item.variant}-${i}">
            <div class="question-header" onclick="toggle('q-${item.variant}-${i}')">
              <span class="q-num">${i+1}</span>
              <span class="q-text">${q.q}</span>
              <span class="toggle-icon">▼</span>
            </div>
            <div class="answer">
              <div class="answer-inner"><p>${q.a}</p></div>
            </div>
          </div>
        `).join('')}
        <div class="tags">
          ${item.tags.map(t => `<span class="tag">${t}</span>`).join('')}
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function toggle(id) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
}

let currentTag = 'all';

function filterTag(tag, btn) {
  currentTag = tag;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  let filtered = data;
  if (currentTag !== 'all') {
    filtered = filtered.filter(item => item.tags.includes(currentTag));
  }
  if (search) {
    filtered = filtered.filter(item =>
      item.variant.toString().includes(search) ||
      item.questions.some(q => q.q.toLowerCase().includes(search) || q.a.toLowerCase().includes(search)) ||
      item.tags.some(t => t.includes(search))
    );
  }
  renderCards(filtered);
}

document.getElementById('searchInput').addEventListener('input', applyFilters);

renderCards(data);
